name: task_tree_app
description: A task scheduling tree app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Replaces localStorage — saves data on device
  shared_preferences: ^2.2.2

  # Replaces CSS UUID/Date.now() — generates unique task IDs
  uuid: ^4.3.3

  # For date picker in task form
  intl: ^0.19.0

  provider: ^6.1.2  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true